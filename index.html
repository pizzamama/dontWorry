<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Not Alone</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fdf6f7;
    --text: #2e1f22;
    --muted: #a08088;
    --accent: #c4687a;
    --accent-soft: #e8a0ab;
    --card: #fff9fa;
    --border: #ecd5d9;
    --input-bg: #fff;
    --blob1: #e8a0ab;
    --blob2: #f2c4ca;
    --transition: background 0.6s ease, color 0.6s ease, border-color 0.6s ease, box-shadow 0.6s ease;
  }

  html.dark {
    --bg: #1a1015;
    --text: #f0e4e7;
    --muted: #9e7e84;
    --accent: #d4808f;
    --accent-soft: #8a4a57;
    --card: #221519;
    --border: #3a2028;
    --input-bg: #1e1217;
    --blob1: #6b2a38;
    --blob2: #3d1520;
  }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
    transition: var(--transition);
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.28;
    pointer-events: none;
    z-index: 0;
    transition: background 0.6s ease, opacity 0.6s ease;
  }
  body::before {
    width: 560px; height: 560px;
    background: radial-gradient(circle, var(--blob1), transparent);
    top: -140px; right: -120px;
  }
  body::after {
    width: 420px; height: 420px;
    background: radial-gradient(circle, var(--blob2), transparent);
    bottom: -100px; left: -100px;
  }
  html.dark body::before { opacity: 0.45; }
  html.dark body::after  { opacity: 0.38; }

  .mode-badge {
    position: fixed;
    top: 1.2rem;
    right: 1.4rem;
    font-family: 'Jost', sans-serif;
    font-size: 0.62rem;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    z-index: 10;
    opacity: 0.7;
    transition: color 0.6s ease;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }

  #screen-input { animation: fadeUp 0.7s ease both; }
  #screen-result { display: none; animation: fadeUp 0.7s ease both; }
  #screen-loading { display: none; animation: fadeUp 0.4s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 0.68rem;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.6rem;
    transition: color 0.6s ease;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.9rem, 5vw, 2.6rem);
    font-weight: 400;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 0.6rem;
    transition: color 0.6s ease;
  }

  .subtitle {
    font-size: 0.93rem;
    font-weight: 300;
    color: var(--muted);
    margin-bottom: 2.4rem;
    line-height: 1.7;
    transition: color 0.6s ease;
  }

  textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.3rem;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 1.7;
    transition: var(--transition), border-color 0.2s, box-shadow 0.2s;
    min-height: 110px;
  }
  textarea::placeholder { color: var(--border); font-style: italic; }
  textarea:focus {
    border-color: var(--accent-soft);
    box-shadow: 0 0 0 3px rgba(196, 104, 122, 0.1);
  }

  .char-count {
    text-align: right;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.4rem;
    margin-bottom: 1.4rem;
    opacity: 0.6;
    font-weight: 300;
    transition: color 0.6s ease;
  }

  button.primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 0.85rem 2.4rem;
    font-family: 'Jost', sans-serif;
    font-size: 0.88rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.3s, transform 0.15s, box-shadow 0.2s;
  }
  button.primary:hover {
    background: #b05568;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(196, 104, 122, 0.3);
  }
  html.dark button.primary:hover {
    box-shadow: 0 4px 20px rgba(212, 128, 143, 0.4);
  }
  button.primary:active { transform: translateY(0); box-shadow: none; }
  button.primary:disabled { opacity: 0.35; cursor: default; transform: none; box-shadow: none; }

  button.ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 50px;
    padding: 0.75rem 2rem;
    font-family: 'Jost', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, transform 0.15s;
    margin-top: 1rem;
  }
  button.ghost:hover { border-color: var(--accent-soft); color: var(--accent); transform: translateY(-1px); }

  .loading-wrap { padding: 3rem 0; }
  .dots {
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .dots span {
    width: 7px; height: 7px;
    background: var(--accent-soft);
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
    transition: background 0.6s ease;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-10px); opacity: 1; }
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.4rem 2.2rem;
    margin-bottom: 1.6rem;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 24px rgba(196, 104, 122, 0.07);
    transition: var(--transition);
  }
  html.dark .result-card { box-shadow: 0 2px 32px rgba(0, 0, 0, 0.4); }
  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-soft), var(--blob2));
    border-radius: 20px 20px 0 0;
    transition: background 0.6s ease;
  }

  .result-label {
    font-size: 0.67rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent-soft);
    margin-bottom: 1.1rem;
    font-weight: 300;
    transition: color 0.6s ease;
  }

  .result-message {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.15rem, 3vw, 1.4rem);
    line-height: 1.7;
    color: var(--text);
    font-weight: 400;
    transition: color 0.6s ease;
  }
  .result-message em { font-style: italic; color: var(--accent); transition: color 0.6s ease; }

  .divider {
    width: 32px; height: 1px;
    background: var(--border);
    margin: 1.4rem auto;
    transition: background 0.6s ease;
  }

  .result-note {
    font-size: 0.83rem;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.65;
    transition: color 0.6s ease;
  }

  footer {
    margin-top: 3rem;
    font-size: 0.68rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--border);
    transition: color 0.6s ease;
  }
</style>
</head>
<body>

<span class="mode-badge" id="mode-badge"></span>

<div class="container">

  <!-- SCREEN 1: Input -->
  <div id="screen-input">
    <p class="eyebrow">A small reminder</p>
    <h1>What's on your mind?</h1>
    <p class="subtitle">Share what's worrying you. It stays anonymous,<br>and it might help to know you're not alone.</p>
    <textarea id="worry-input" maxlength="280" placeholder="Type your worry here…" rows="4" oninput="updateCount()"></textarea>
    <div class="char-count"><span id="char-count">0</span> / 280</div>
    <button class="primary" id="submit-btn" onclick="submitWorry()" disabled>Share it</button>
  </div>

  <!-- SCREEN 2: Loading -->
  <div id="screen-loading">
    <div class="loading-wrap">
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- SCREEN 3: Result -->
  <div id="screen-result">
    <div class="result-card">
      <p class="result-label">a message for you</p>
      <p class="result-message" id="result-message"></p>
      <div class="divider"></div>
      <p class="result-note">Your worry was shared anonymously. Someone, somewhere, understands.</p>
    </div>
    <button class="ghost" onclick="startOver()">Share another worry</button>
  </div>

</div>

<footer>you are not alone · all worries anonymous</footer>

<script>
  const textarea = document.getElementById('worry-input');
  const submitBtn = document.getElementById('submit-btn');

  // ── Dark mode: active between 9pm and 6am ──
  function applyTheme() {
    const hour = new Date().getHours();
    const isNight = hour >= 21 || hour < 6;
    document.documentElement.classList.toggle('dark', isNight);
    const badge = document.getElementById('mode-badge');
    if (isNight) {
      const phrases = ['late night', 'quiet hours', 'the small hours'];
      badge.textContent = phrases[Math.floor(Math.random() * phrases.length)];
    } else {
      badge.textContent = '';
    }
  }
  applyTheme();
  setInterval(applyTheme, 60 * 1000);

  function updateCount() {
    document.getElementById('char-count').textContent = textarea.value.length;
    submitBtn.disabled = textarea.value.trim().length < 3;
  }

  function show(screenId) {
    ['screen-input','screen-loading','screen-result'].forEach(id => {
      const el = document.getElementById(id);
      el.style.display = 'none';
      el.style.animation = 'none';
    });
    const target = document.getElementById(screenId);
    target.style.display = 'block';
    void target.offsetWidth;
    target.style.animation = 'fadeUp 0.7s ease both';
  }

  async function getLocation() {
    try {
      const res = await fetch('https://ipapi.co/json/');
      const data = await res.json();
      const city = data.city || '';
      const country = data.country_name || '';
      if (city && country) return `${city}, ${country}`;
      if (country) return country;
      return 'somewhere in the world';
    } catch {
      return 'somewhere in the world';
    }
  }

  async function generateOtherWorry(worry) {
    // Calls your own Netlify Function — API key stays server-side
    const res = await fetch('/.netlify/functions/worry', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ worry }),
    });
    const data = await res.json();
    return data.phrase || null;
  }

  async function submitWorry() {
    const worry = textarea.value.trim();
    if (!worry) return;

    show('screen-loading');

    const [location, otherWorry] = await Promise.all([
      getLocation(),
      generateOtherWorry(worry),
    ]);

    const worryPhrase = otherWorry || 'the weight of things left unsaid';
    const message = `You're not alone. Right now, someone from <em>${location}</em> is worried about ${worryPhrase}.`;

    document.getElementById('result-message').innerHTML = message;
    show('screen-result');
  }

  function startOver() {
    textarea.value = '';
    document.getElementById('char-count').textContent = '0';
    submitBtn.disabled = true;
    show('screen-input');
  }
</script>
</body>
</html>
