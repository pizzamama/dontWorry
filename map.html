<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worry Map · You're Not Alone</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fdf6f7;
    --text: #2e1f22;
    --muted: #a08088;
    --accent: #c4687a;
    --accent-soft: #e8a0ab;
    --card: #fff9fa;
    --border: #ecd5d9;
  }
  html.dark {
    --bg: #1a1015;
    --text: #f0e4e7;
    --muted: #9e7e84;
    --accent: #d4808f;
    --accent-soft: #8a4a57;
    --card: #221519;
    --border: #3a2028;
  }

  html, body { height: 100%; width: 100%; overflow: hidden; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: var(--text);
    position: relative;
  }

  #map {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .leaflet-control-attribution {
    font-family: 'Jost', sans-serif !important;
    font-size: 0.6rem !important;
    background: transparent !important;
    color: var(--muted) !important;
    box-shadow: none !important;
  }
  .leaflet-control-attribution a { color: var(--muted) !important; }

  .map-header {
    position: absolute;
    top: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
    background: rgba(253, 246, 247, 0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.2rem 2rem;
    min-width: 240px;
    max-width: 90vw;
    box-shadow: 0 4px 24px rgba(196, 104, 122, 0.1);
    transition: background 0.6s, border-color 0.6s;
  }
  html.dark .map-header {
    background: rgba(26, 16, 21, 0.84);
    box-shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
  }

  .eyebrow {
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
    transition: color 0.6s;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 3.5vw, 1.7rem);
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.3rem;
    transition: color 0.6s;
  }

  .subtitle {
    font-size: 0.8rem;
    font-weight: 300;
    color: var(--muted);
    transition: color 0.6s;
  }

  .home-link {
    position: absolute;
    bottom: 1.6rem;
    left: 1.6rem;
    z-index: 10;
    font-family: 'Jost', sans-serif;
    font-size: 0.62rem;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    opacity: 0.85;
    background: rgba(253, 246, 247, 0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 0.45rem 0.9rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    transition: color 0.3s, opacity 0.3s, background 0.6s, border-color 0.6s;
  }
  html.dark .home-link { background: rgba(26, 16, 21, 0.78); }
  .home-link:hover { color: var(--accent); opacity: 1; }

  /* Heartbeat marker */
  .hb-wrap {
    position: relative;
    width: 12px;
    height: 12px;
  }
  .hb-dot {
    width: 10px;
    height: 10px;
    background: #c4687a;
    border-radius: 50%;
    position: absolute;
    top: 1px;
    left: 1px;
  }
  html.dark .hb-dot { background: #d4808f; }
  .hb-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1.5px solid #c4687a;
    animation: hb-pulse 2.4s ease-out infinite;
    opacity: 0;
  }
  html.dark .hb-ring { border-color: #d4808f; }

  @keyframes hb-pulse {
    0%   { transform: scale(0.7); opacity: 0.9; }
    100% { transform: scale(2.8); opacity: 0; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="map-header">
  <p class="eyebrow">across the world</p>
  <h1>You are not alone</h1>
  <p class="subtitle" id="map-subtitle">Loading&hellip;</p>
</div>

<a class="home-link" href="/">&#8592; back</a>

<script>
  // Dark mode — same logic as index.html
  (function() {
    const hour = new Date().getHours();
    if (hour >= 21 || hour < 6) document.documentElement.classList.add('dark');
  })();

  const isDark = document.documentElement.classList.contains('dark');

  const map = L.map('map', {
    center: [20, 0],
    zoom: 2,
    minZoom: 2,
    zoomControl: false,
    attributionControl: true,
  });

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // CartoDB tiles — free, no API key needed
  L.tileLayer(
    isDark
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://openstreetmap.org/copyright">OSM</a>',
      subdomains: 'abcd',
      maxZoom: 19,
    }
  ).addTo(map);

  async function loadHeartbeats() {
    const subtitle = document.getElementById('map-subtitle');
    try {
      const res = await fetch('/.netlify/functions/heartbeats');
      if (!res.ok) throw new Error('fetch failed');
      const { heartbeats } = await res.json();

      subtitle.textContent = heartbeats.length === 0
        ? 'No worries shared yet — be the first.'
        : `${heartbeats.length} ${heartbeats.length === 1 ? 'worry' : 'worries'} shared recently`;

      heartbeats.forEach((h, i) => {
        if (typeof h.lat !== 'number' || typeof h.lng !== 'number') return;

        const delay = ((i * 0.35) % 2.4).toFixed(2);
        const icon = L.divIcon({
          className: '',
          html: `<div class="hb-wrap">
                   <div class="hb-dot"></div>
                   <div class="hb-ring" style="animation-delay:${delay}s"></div>
                 </div>`,
          iconSize: [12, 12],
          iconAnchor: [6, 6],
        });

        L.marker([h.lat, h.lng], { icon }).addTo(map);
      });
    } catch {
      subtitle.textContent = 'Could not load worry locations.';
    }
  }

  loadHeartbeats();
</script>
</body>
</html>
