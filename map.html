<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worry Map · You're Not Alone</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #f3ead9;
    --text:        #1c1008;
    --muted:       #8a6e4e;
    --accent:      #7a3d22;
    --accent-warm: #c4703a;
    --border:      #d4be9e;
  }
  html.dark {
    --bg:          #110c07;
    --text:        #e6d2b4;
    --muted:       #7a5e3e;
    --accent:      #bf6e38;
    --accent-warm: #e08c50;
    --border:      #2c1e0f;
  }

  html, body { height: 100%; width: 100%; overflow: hidden; }

  body {
    font-family: 'Crimson Pro', serif;
    background: var(--bg);
    color: var(--text);
    position: relative;
  }

  #map {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  /* Leaflet overrides */
  .leaflet-control-attribution {
    font-family: 'Crimson Pro', serif !important;
    font-size: 0.65rem !important;
    font-style: italic !important;
    background: transparent !important;
    color: var(--muted) !important;
    box-shadow: none !important;
    opacity: 0.6;
  }
  .leaflet-control-attribution a { color: var(--muted) !important; }

  .leaflet-control-zoom a {
    font-family: 'Crimson Pro', serif !important;
    font-weight: 300 !important;
    color: var(--muted) !important;
    background: var(--bg) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover {
    color: var(--accent) !important;
    background: var(--bg) !important;
  }
  html.dark .leaflet-control-zoom a {
    background: var(--bg) !important;
    border-color: var(--border) !important;
  }

  /* Header label */
  .map-header {
    position: absolute;
    top: 2.2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1.1rem 2.2rem 1.2rem;
    min-width: 220px;
    max-width: 88vw;
    transition: background 0.9s, border-color 0.9s;
  }

  .eyebrow {
    font-size: 0.68rem;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.3rem;
    opacity: 0.75;
    transition: color 0.9s;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 4vw, 1.9rem);
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.25rem;
    letter-spacing: -0.01em;
    transition: color 0.9s;
  }

  .subtitle {
    font-size: 0.82rem;
    font-weight: 300;
    font-style: italic;
    color: var(--muted);
    opacity: 0.75;
    transition: color 0.9s;
  }

  /* Back link */
  .home-link {
    position: absolute;
    bottom: 1.8rem;
    left: 1.8rem;
    z-index: 10;
    font-family: 'Crimson Pro', serif;
    font-size: 0.8rem;
    font-weight: 300;
    font-style: italic;
    color: var(--muted);
    text-decoration: none;
    opacity: 0.7;
    transition: color 0.3s, opacity 0.3s;
  }
  .home-link:hover { color: var(--accent); opacity: 1; }

  /* Heartbeat marker */
  .hb-wrap {
    position: relative;
    width: 10px;
    height: 10px;
  }
  .hb-dot {
    width: 8px;
    height: 8px;
    background: var(--accent, #7a3d22);
    border-radius: 50%;
    position: absolute;
    top: 1px;
    left: 1px;
    opacity: 0.85;
  }
  .hb-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid var(--accent, #7a3d22);
    animation: hb-pulse 2.8s ease-out infinite;
    opacity: 0;
  }
  @keyframes hb-pulse {
    0%   { transform: scale(0.6); opacity: 0.75; }
    100% { transform: scale(3);   opacity: 0; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="map-header">
  <p class="eyebrow">across the world</p>
  <h1>You are not alone</h1>
  <p class="subtitle" id="map-subtitle">Loading&hellip;</p>
</div>

<a class="home-link" href="/">&#8592; back</a>

<script>
  // Dark mode — same logic as index.html
  (function() {
    const hour = new Date().getHours();
    if (hour >= 21 || hour < 6) document.documentElement.classList.add('dark');
  })();

  const isDark = document.documentElement.classList.contains('dark');

  const map = L.map('map', {
    center: [20, 0],
    zoom: 2,
    minZoom: 2,
    zoomControl: false,
    attributionControl: true,
  });

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // Voyager tiles (warm, vintage atlas) for light; Dark Matter for night
  L.tileLayer(
    isDark
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://openstreetmap.org/copyright">OSM</a>',
      subdomains: 'abcd',
      maxZoom: 19,
    }
  ).addTo(map);

  async function loadHeartbeats() {
    const subtitle = document.getElementById('map-subtitle');
    try {
      const res = await fetch('/.netlify/functions/heartbeats');
      if (!res.ok) throw new Error('fetch failed');
      const { heartbeats } = await res.json();

      subtitle.textContent = heartbeats.length === 0
        ? 'No worries shared yet — be the first.'
        : `${heartbeats.length} ${heartbeats.length === 1 ? 'worry' : 'worries'} shared recently`;

      heartbeats.forEach((h, i) => {
        if (typeof h.lat !== 'number' || typeof h.lng !== 'number') return;

        const delay = ((i * 0.38) % 2.8).toFixed(2);
        const accentColor = isDark ? '#e08c50' : '#7a3d22';
        const icon = L.divIcon({
          className: '',
          html: `<div class="hb-wrap">
                   <div class="hb-dot" style="background:${accentColor}"></div>
                   <div class="hb-ring" style="border-color:${accentColor};animation-delay:${delay}s"></div>
                 </div>`,
          iconSize: [10, 10],
          iconAnchor: [5, 5],
        });

        L.marker([h.lat, h.lng], { icon }).addTo(map);
      });
    } catch {
      subtitle.textContent = 'Could not load worry locations.';
    }
  }

  loadHeartbeats();
</script>
</body>
</html>
